# Render Blueprint — deploys Schoolhub CRM as a single web service.
# In Render: New → Blueprint → connect this repo. Then set DATABASE_URL
# (your Neon Postgres connection string) and optionally ANTHROPIC_API_KEY.
services:
  - type: web
    name: schoolhub-crm
    runtime: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Your Neon Postgres connection string (must include ?sslmode=require).
      - key: DATABASE_URL
        sync: false
      # Optional — enables real AI email drafting via Claude.
      - key: ANTHROPIC_API_KEY
        sync: false
      # SMTP2GO keys for real email sending (per agency). The SchoolWebsites key
      # also sends auth emails (invites / password resets).
      - key: SMTP2GO_API_KEY_SCHOOLWEBSITES
        sync: false
      - key: SMTP2GO_API_KEY_CADDIE
        sync: false
      # Optional — starting password for the super admin's first sign-in.
      - key: SUPERADMIN_INITIAL_PASSWORD
        sync: false
      # Optional — fixed secret for login sessions (else derived from DATABASE_URL).
      - key: JWT_SECRET
        sync: false
